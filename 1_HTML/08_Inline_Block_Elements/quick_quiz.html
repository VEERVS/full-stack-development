<!-- Without using <br> make a form vertcially aligned asking for name, city and pincode form the user -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form action="post">

        <div>
            <label for="username">Name:</label>
            <input type="text" placeholder="Enter the name" name="username" id="username">
        </div>

        <div>
            <label for="city">City:</label>
            <input type="text" placeholder="Enter the city" name="city" id="city">
        </div>

        <div>
            <label for="pin">Code:</label>
            <input type="text" placeholder="Enter the code" name="pin" id="pin">
        </div>

    </form>
        
</body>
</html>
