<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        h1{
            color: red;
        }

        .one{
            color: yellow;
        }

        .two{
            color: #1500ff;
        }

        .three{
            color: rgb(0, 255, 0);
        }

        .four{
            color: rgba(255, 0, 163, 1);
        }

        .five{
            color: hsl(19, 100%, 50%);
        }

        ol{
            background-color: black;
        }


    </style>
</head>
<body>

    <h1>Lets Learn About Colors</h1>

    <p>
        Colors can be added in css in following ways:-
        <ol>
            <li class="one">Color Keywords</li>
            <li class="two">Hex Color Codes</li>
            <li class="three">RGB</li>
            <li class="four">RGBA</li>
            <li class="five">HSL</li>
        </ol>
    </p>
    
</body>
</html>
