<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise-3 Design This Card</title>

    <style>

        *{
            box-sizing: border-box;
        }

        .box1{
            background-color: #eaeff1;
            height: 635px;
            width: 452px;
            position: relative;
            top: 5vh;
            left: 70vh;
        }
        .box2{
            position: absolute;
            background-color: #ffffff;
            height: 80vh;
            width: 25vw;
            top: 25px;
            left: 35px;
            box-shadow: 0px 0px 5px 0px #c1d1dc;
            border-radius: 20px;
        }
        
        img{
            position: absolute;
            height: 35vh;
            width: 95%;
            border-radius: 20px;
            margin: 10px;
        }

        ul{
            display: flex;
        }
        
        ul li{
            list-style-type: none;
            margin: 5px;
            padding: 10px;
            border: 1px solid black;
            border-radius: 50px;
        }

        .nav{
            position: relative;
            top: 46%;
            display: flex;
            background-color: #ffffff;
        }

        .head1{
            position: absolute;
            top: 56%;
            left: 5%;
        }

        .para{
            position: absolute;
            top: 66%;
            left: 5%;
        }

        .read{
            color: #3794ff;
            background-color: #e0efff;
            position: absolute;
            top: 88%;
            left: 40%;
            border-radius: 80px;
            padding: 15px;
        }

    </style>

</head>
<body>


    <div class="box1">
        <div class="box2">
            <div class="imgbox">
                <img src="omen.jpg" alt="omen image">
            </div>

            <div class="nav">
                <ul>
                    <li>Nature</li>
                    <li>Lake</li>
                </ul>
            </div>

            <div class="head1">
                <h1>Omen Of VALORANT</h1>
            </div>

            <div class="para">
                <p>
                    Lorem, ipsum dolor sit amet consectetur adipisicing elit. Aspernatur provident, nesciunt eligendi unde nulla consequatur voluptates facere dolorum? Ipsam, nobis reprehenderit. Possimus quae corrupti dolor fuga. Deserunt recusandae veniam libero?
                </p>
            </div>

            <div class="read">
                Read More
            </div>

        </div>
    </div>
    
</body>
</html>
