<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity </title>

    <style>
        
        .cred{
            color: red;
        }
        
        .cblue{
            color: blue !important;
        }
        
        h1.yellow{
            color: yellow;
        }

        .cgreen{
            color: green;
        }
        
        [data-x=a]{
            color: maroon;
        }
        

    </style>

</head>
<body>

    <h1 class="cred cblue cgreen yellow" data-x="a">This is a heading!</h1>
    
</body>
</html>
