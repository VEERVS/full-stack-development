<!-- You are given 12 files, 6 mp3, 6mp3, created a webpage showing those and each having different attribute-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure HTML Media Player</title>
</head>
<body>

    <h1>Pure HTML Media Player</h1>

    <p>This Media Player has 6 Audio and 6 Video</p>

    <h2>Videos:-</h2>

    <video src="demo.mp4" height="200" controls></video>
    <video src="demo.mp4" height="200" controls autoplay></video>
    <video src="demo.mp4" height="200" controls muted></video>
    <video src="demo.mp4" height="200" controls poster="ghost.jpg"></video>
    <video src="demo.mp4" height="200" controls loop autoplay></video>
    <video src="demo.mp4" height="200" controls width="200"></video>

    <h2>Audios:-</h2>
    
    <audio src="GameSound.mp3" controls></audio>
    <audio src="GameSound.mp3" controls autoplay muted></audio>
    <audio src="GameSound.mp3" controls preload="auto"></audio>
    <audio src="GameSound.mp3" controls preload="metadata"></audio>
    <audio src="GameSound.mp3" controls preload="none"></audio>
    <audio src="GameSound.mp3" controls autoplay muted loop></audio>
    
</body>
</html>
