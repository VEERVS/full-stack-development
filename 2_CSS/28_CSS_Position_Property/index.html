<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            height: 233px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }

        .box1 {
            background-color: red;
            /* position: absolute; */
            position: sticky;
            top: 0px;
            left: 20px;
            height: 114px;
            width: 100%;
        }

        .box2 {
            background-color: green;
            /* position: relative;
            top: 34px;
            left: 54px; */
        }

        .box3 {
            background-color: blue;
            /* position: fixed;
            bottom: 0px;
            left: 8vw;
            height: 114px; */
        }

        .box4 {
            background-color: blueviolet;
        }

        .parent{
            border: 3px solid black;
            padding: 43px;
            margin: 34px;
            /* position: absolute; */
        }

    </style>
</head>

<body>

    <div class="parent">

        <div class="box box1">
            I am box1
        </div>

        <div class="box box2">
            I am box2
        </div>

        <div class="box box3">
            I am box3
        </div>

        <div class="box box4">
            I am box4
        </div>

    </div>

</body>

</html>
