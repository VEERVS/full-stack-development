<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows and Outlines</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 5px 15px 5px rgb(87, 64, 64);
        }

        .text {
            text-shadow: 5px 3px 3px red;
            border: 2px solid black;
            outline: 2px solid blue;
            outline-offset: 5px;
            border-radius: 35px;
        }
    </style>
</head>

<body>

    <div class="box">
        I am a BOX
    </div>

    <p class="text">
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Ipsa tempora at necessitatibus nam soluta architecto
        eum nemo illo quas saepe tempore culpa, facilis quod excepturi dicta odit consequuntur quibusdam. Ipsa.
    </p>

</body>

</html>
